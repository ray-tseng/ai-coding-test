apiVersion: apps/v1
kind: Deployment
metadata:
  name: gooaye-summary-app
  labels:
    app: gooaye-summary
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gooaye-summary
  template:
    metadata:
      labels:
        app: gooaye-summary
    spec:
      nodeSelector:
        cloud.google.com/gke-spot: "true"
      tolerations:
      - key: "cloud.google.com/gke-spot"
        operator: "Equal"
        value: "true"
        effect: "NoSchedule"
      containers:
      - name: gooaye-summary
        image: r76021061/gooaye-summary:VERSION_PLACEHOLDER
        imagePullPolicy: Always
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        ports:
        - containerPort: 3000
        envFrom:
        - configMapRef:
            name: gooaye-summary-config
        - secretRef:
            name: gooaye-secrets
        volumeMounts:
        - name: data-volume
          mountPath: /app/data
        - name: firebase-config-volume
          mountPath: /app/firebase-applet-config.json
          subPath: firebase-applet-config.json
          readOnly: true
      volumes:
      - name: data-volume
        persistentVolumeClaim:
          claimName: gooaye-summary-pvc
      - name: firebase-config-volume
        secret:
          secretName: firebase-config-secret
